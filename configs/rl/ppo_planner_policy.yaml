algorithm: PPO
env_type: planner
total_timesteps: 2000000
n_envs: 8
vec_env_type: subproc
subproc_start_method: fork
seed: 7
n_steps: 2048
batch_size: 512
learning_rate: 0.0002
gamma: 0.9995
gae_lambda: 0.995
clip_range: 0.2
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5
policy_log_std_init: -0.5
policy_net_arch: [256, 256]
use_sde: true
sde_sample_freq: 25
action_mode: profile_pedal_residual
profile_speed_tracking_enabled: true
profile_speed_residual_authority: 0.08
profile_speed_residual_error_guard_mps: 5.0
profile_residual_disable_during_coast: true
longitudinal_action_deadband: 0.05
longitudinal_action_rise_rate: 6.0
longitudinal_action_fall_rate: 10.0
speed_floor_lateral_error_scale: 1.5
speed_floor_heading_error_scale: 0.25
speed_demand_curvature_source: raceline
speed_demand_max_decel: 16.0
speed_demand_brake_buffer: 10.0
speed_demand_transition: 15.0
speed_demand_full_reduction: 25.0
speed_floor_lookahead_distances: [0.0, 20.0, 40.0, 60.0, 80.0, 100.0, 120.0, 140.0, 160.0, 180.0, 200.0, 220.0]
lateral_offset_reference: raceline
reference_lookahead_time: 0.25
randomize_resets: true
reset_s_mode: random
reset_s_fraction_min: 0.0
reset_s_fraction_max: 1.0
reset_speed_mode: profile
reset_speed_scale_min: 0.40
reset_speed_scale_max: 0.85
reset_speed_min: 8.0
reset_speed_max: 20.0
reset_lateral_offset_max: 0.4
reset_lateral_margin: 2.0
reset_heading_error_max: 0.08
checkpoint_interval_steps: 10000
frontier_enabled: true
frontier_initial_progress_m: 350.0
frontier_validation_clearance_m: 40.0
frontier_max_advance_m: 150.0
frontier_start_envs: 2
frontier_practice_envs: 4
frontier_random_envs: 2
frontier_practice_lookback_min_m: 150.0
frontier_practice_lookback_max_m: 250.0
checkpoint_prefix: ppo_profile_speed_residual
tensorboard_log: logs/tensorboard
model_dir: models/ppo_profile_speed_residual
auto_evaluate_after_training: true
eval_backend: mock
eval_deterministic: true
eval_output_dir: logs
eval_randomize_resets: false
eval_start_at_profile_speed: true
