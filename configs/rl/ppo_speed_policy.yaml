algorithm: PPO
total_timesteps: 100000
n_envs: 4
vec_env_type: subproc
subproc_start_method: fork
seed: 11
n_steps: 1024
batch_size: 256
learning_rate: 0.0003
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.015
vf_coef: 0.5
max_grad_norm: 0.5
policy_log_std_init: -0.35
policy_net_arch: [128, 128]
target_speed_scale_min: 0.35
target_speed_scale_max: 1.1
randomize_resets: true
reset_s_mode: random
reset_s_fraction_min: 0.0
reset_s_fraction_max: 1.0
reset_speed_min: 8.0
reset_speed_max: 20.0
reset_lateral_offset_max: 1.0
reset_lateral_margin: 1.0
reset_heading_error_max: 0.05
checkpoint_interval_steps: 10000
checkpoint_prefix: ppo_speed_policy
tensorboard_log: logs/tensorboard
model_dir: models/ppo_speed_policy
auto_evaluate_after_training: true
eval_backend: mock
eval_deterministic: true
eval_output_dir: logs
eval_randomize_resets: false
